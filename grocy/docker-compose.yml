version: "3"
services:
  grocy:
    image: "linuxserver/grocy:3.1.3" # update manually esp. if using mobile app
    container_name: "grocy"
    restart: "unless-stopped"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: "Europe/London"
    volumes:
      - "./config:/config"
    expose:
      - 80
    networks:
      - "proxy"
networks:
  proxy:
    driver: "bridge"
    ipam:
      config:
        - subnet: "172.16.24.0/29"
