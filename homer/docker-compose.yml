---
version: "3"
services:
  homer:
    image: docker.io/b4bz/homer:latest
    container_name: homer
    restart: unless-stopped
    environment:
      - UID=1000
      - GID=1000
      - TZ=Europe/London
    volumes:
      - ./config:/www/assets
    expose:
      - 8080
networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
      - subnet: 172.16.8.0/27
