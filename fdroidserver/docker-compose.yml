version: "2.4"
services:
  fdroid:
    image: docker.io/austozi/fdroidserver:latest
    container_name: fdroid
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/www:/var/www/html
      - ./config/log:/var/log/apache2
    expose:
      - 80
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.9.0/29
