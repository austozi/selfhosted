---
version: "3"
services:
  freshrss:
    image: docker.io/linuxserver/freshrss:latest
    container_name: freshrss
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - ./config:/config
    expose:
      - 80
networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
      - subnet: 172.16.32.0/27
