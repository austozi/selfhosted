version: "3"
services:
  ulogger:
    image: austozi/ulogger-server:latest
    container_name: ulogger
    restart: unless-stopped
    command: sh -c '/init.sh && chown -R nobody:nobody /data && /run.sh'
    environment:
      - TZ=Europe/London
      - ULOGGER_ADMIN_USER=admin
      - ULOGGER_ENABLE_SETUP=0
      - ULOGGER_DB_DRIVER=sqlite
      - ULOGGER_LANG=en_GB.utf-8
    volumes:
      - ./config:/data
    expose:
      - 80
    networks:
      - swag_default
networks:
  swag_default:
    external: true
