---
version: "3"
services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    command: >
      --config=/config/filebrowser.json --database=/config/database.db --address=0.0.0.0 --port=8080
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
    volumes:
      - ./config:/config
      - ./data:/data
    expose:
      - 8080
networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
      - subnet: 172.16.29.0/27
